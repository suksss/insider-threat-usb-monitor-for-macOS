<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>macOS USB Monitor — Live Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 1rem;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    .stats-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stats-row .card {
      flex: 1;
      padding: 1rem;
      background: #161b22;
      border-radius: 10px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .stats-row .card div {
      margin-top: 0.5rem;
      font-size: 1.5rem;
      color: #58a6ff;
    }

    .section {
      margin-bottom: 2rem;
    }
    .section h2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .section h2 a {
      font-size: 0.9rem;
      color: #58a6ff;
      text-decoration: none;
    }

    .log-container {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #30363d;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 0.5rem;
      border-bottom: 1px solid #30363d;
      text-align: left;
      font-size: 0.9rem;
    }
    th {
      background-color: #161b22;
      position: sticky;
      top: 0;
    }
    td {
      white-space: nowrap;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td:hover {
      overflow: visible;
      white-space: normal;
      background: #21262d;
      z-index: 1;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>macOS USB Monitor — Live Dashboard</h1>
  <p id="status">Dashboard <span style="color:lime">connected</span></p>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="card">Total Files<div id="stat-files">0</div></div>
    <div class="card">Data Transferred<div id="stat-data">0 B</div></div>
    <div class="card">USB Insertions<div id="stat-insertions">0</div></div>
    <div class="card">USB Removals<div id="stat-removals">0</div></div>
  </div>

  <!-- USB Events -->
  <div class="section">
    <h2>Recent USB Events <a href="/api/events?type=usb" target="_blank">Open JSON</a></h2>
    <div class="log-container">
      <table id="usb-events">
        <thead>
          <tr><th>Time</th><th>Event</th><th>Volume</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- File Events -->
  <div class="section">
    <h2>Recent File Events <a href="/api/events?type=file" target="_blank">Open JSON</a></h2>
    <div class="log-container">
      <table id="file-events">
        <thead>
          <tr><th>Time</th><th>Filename</th><th>Folder</th><th>Size</th><th>Path</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    async function fetchStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stat-files').innerText = data.total_files || 0;
      document.getElementById('stat-data').innerText = formatBytes(data.total_data || 0);
      document.getElementById('stat-insertions').innerText = data.usb_insertions || 0;
      document.getElementById('stat-removals').innerText = data.usb_removals || 0;
    }

    async function fetchEvents(type, tableId, limit=100) {
      const res = await fetch(`/api/events?type=${type}&limit=${limit}`);
      const events = await res.json();
      const tbody = document.querySelector(`#${tableId} tbody`);
      tbody.innerHTML = '';
      events.forEach(ev => {
        const row = document.createElement('tr');
        if(type === 'usb'){
          row.innerHTML = `<td>${ev.time}</td><td>${ev.event}</td><td>${ev.volume || ''}</td>`;
        } else {
          row.innerHTML = `<td>${ev.time}</td><td>${ev.filename}</td><td>${ev.folder}</td><td>${ev.size}</td><td>${ev.path}</td>`;
        }
        tbody.appendChild(row);
      });
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + sizes[i];
    }

    async function refresh() {
      fetchStats();
      fetchEvents('usb', 'usb-events');
      fetchEvents('file', 'file-events');
    }

    setInterval(refresh, 2000);
    refresh();
  </script>
</body>
</html>
